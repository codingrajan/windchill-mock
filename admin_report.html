<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Admin Console | Windchill</title>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #F0F4F8; color: #1A2B3C; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
  .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,56,101,0.1); width: 100%; max-width: 1200px; margin-bottom: 20px; }
  h1, h2 { color: #003865; margin-top: 0; }
  .btn { background: #003865; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
  .btn:hover { background: #002A4E; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-export { background: #2D7D46; margin-right: 10px; }
  .btn-danger { background: #C0392B; }
  input, select { padding: 10px; border: 1px solid #CBD5E0; border-radius: 6px; font-size: 14px; outline: none; }
  
  table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
  th { background: #D6E4F0; color: #003865; padding: 12px; text-align: left; position: sticky; top: 0; }
  td { padding: 12px; border-bottom: 1px solid #CBD5E0; vertical-align: top; }
  
  #login-screen { max-width: 400px; margin: 50px auto; text-align: center; }
  #dashboard-screen { display: none; width: 100%; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 2px solid #CBD5E0; margin-bottom: 20px; }
  .tab { padding: 12px 24px; cursor: pointer; font-weight: bold; color: #4A5568; border-bottom: 3px solid transparent; }
  .tab.active { color: #003865; border-bottom-color: #E87722; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Filters */
  .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; background: #F8FAFC; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #E2E8F0; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 12px; font-weight: bold; color: #4A5568; }

  .preset-controls { display: flex; justify-content: space-between; align-items: center; background: #F8FAFC; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #E2E8F0; }
  .q-checkbox { width: 18px; height: 18px; cursor: pointer; }
</style>
</head>
<body>

<div class="card" id="login-screen">
  <h1>Admin Login</h1>
  <p style="color: #4A5568; margin-bottom: 24px;">Authenticate to access the console.</p>
  <input type="email" id="admin-email" placeholder="Admin Email" style="width: 90%; margin-bottom: 15px;">
  <input type="password" id="admin-pwd" placeholder="Password" style="width: 90%; margin-bottom: 15px;">
  <button class="btn" id="btn-login" style="width: 95%; padding: 14px; font-size: 16px;">Secure Login</button>
  <div id="login-error" style="color: #C0392B; margin-top: 15px; font-weight: bold; display: none;"></div>
</div>

<div id="dashboard-screen">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; width: 100%; max-width: 1200px; margin: 0 auto 20px auto;">
    <h2>⚙️ Windchill Admin Console</h2>
    <button class="btn btn-danger" id="btn-logout">Logout</button>
  </div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('reports')">📊 Exam Reports</div>
      <div class="tab" onclick="switchTab('presets')">🛠️ Preset Manager</div>
    </div>

    <div id="tab-reports" class="tab-content active">
      <div class="filter-bar">
        <div class="filter-group"><label>Search Name</label><input type="text" id="f-name" placeholder="E.g., John Doe" onkeyup="applyFilters()"></div>
        <div class="filter-group"><label>Date From</label><input type="date" id="f-date-start" onchange="applyFilters()"></div>
        <div class="filter-group"><label>Date To</label><input type="date" id="f-date-end" onchange="applyFilters()"></div>
        <div class="filter-group"><label>Min Score (%)</label><input type="number" id="f-score-min" placeholder="0" min="0" max="100" onkeyup="applyFilters()"></div>
        <div class="filter-group"><label>Max Score (%)</label><input type="number" id="f-score-max" placeholder="100" min="0" max="100" onkeyup="applyFilters()"></div>
        <div style="margin-left: auto; align-self: flex-end;">
          <button class="btn btn-export" id="btn-export">📥 Export Filtered CSV</button>
        </div>
      </div>
      
      <div style="overflow-x: auto; max-height: 600px;">
        <table>
          <thead><tr><th>Date & Time</th><th>Examinee Name</th><th>Score</th><th>Status</th><th>Time</th><th>Weakest Domain</th></tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <div id="tab-presets" class="tab-content">
      <div class="preset-controls">
        <div style="display: flex; gap: 15px; align-items: center;">
          <div>
            <label style="font-weight:bold; font-size:14px; display:block; margin-bottom:4px;">Select Preset Slot:</label>
            <select id="preset-slot-selector" onchange="loadPresetContext()">
              <option value="preset_1">PreSet 1 - 25 Questions</option>
              <option value="preset_2">PreSet 2 - 50 Questions</option>
              <option value="preset_3">PreSet 3 - 75 Questions</option>
            </select>
          </div>
          <div style="margin-left: 20px;">
            <div style="font-size: 12px; color: #4A5568;">Selection Status:</div>
            <div style="font-size: 18px; font-weight: 900; color: #003865;" id="selection-counter">Selected: 0 / 25</div>
          </div>
        </div>
        <div>
          <button class="btn btn-danger" id="btn-delete-preset" style="margin-right:10px; display:none;">Delete Preset</button>
          <button class="btn btn-export" id="btn-save-preset">💾 Save Preset to Database</button>
        </div>
      </div>

      <div style="overflow-x: auto; max-height: 600px; border: 1px solid #CBD5E0; border-radius: 8px;">
        <table id="questions-table">
          <thead><tr><th style="width: 50px;">Select</th><th style="width: 60px;">ID</th><th style="width: 80px;">Diff</th><th>Topic</th><th>Question</th></tr></thead>
          <tbody id="questions-body"><tr><td colspan="5" style="text-align:center;">Loading questions from JSON banks...</td></tr></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
// ⚠️ REPLACE THIS OBJECT WITH YOUR FIREBASE CONFIG KEYS
const firebaseConfig = {
  apiKey: "AIzaSyD3DQn88St_z9wuYVwiwBjxC3Y0K3LSVX8",
  authDomain: "windchill-mock-exams.firebaseapp.com",
  projectId: "windchill-mock-exams",
  storageBucket: "windchill-mock-exams.firebasestorage.app",
  messagingSenderId: "971978492228",
  appId: "1:971978492228:web:a9b27813cc55dec40def11",
  measurementId: "G-TNWL8F6TYM"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// ── TAB LOGIC ──
function switchTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${tabId}')"]`).classList.add('active');
  document.getElementById('tab-' + tabId).classList.add('active');
  if (tabId === 'presets' && allQuestions.length === 0) loadQuestionsForPreset();
}

// ── AUTH LOGIC ──
document.getElementById('btn-login').addEventListener('click', () => {
  const email = document.getElementById('admin-email').value;
  const pwd = document.getElementById('admin-pwd').value;
  const btn = document.getElementById('btn-login');
  btn.textContent = "Authenticating...";
  
  auth.signInWithEmailAndPassword(email, pwd).then(() => {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard-screen').style.display = 'block';
    fetchReportData();
  }).catch(e => {
    btn.textContent = "Secure Login";
    document.getElementById('login-error').textContent = "❌ " + e.message;
    document.getElementById('login-error').style.display = 'block';
  });
});

document.getElementById('btn-logout').addEventListener('click', () => {
  auth.signOut().then(() => location.reload());
});

// ── TAB 1: REPORTS & FILTERING ──
let masterReportData = [];
let filteredData = [];

async function fetchReportData() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Fetching secure data...</td></tr>';
  try {
    const snapshot = await db.collection("exam_results").orderBy("examDate", "desc").get();
    masterReportData = [];
    snapshot.forEach(doc => masterReportData.push(doc.data()));
    applyFilters();
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:red;">Error: ${e.message}</td></tr>`;
  }
}

function applyFilters() {
  const fName = document.getElementById('f-name').value.toLowerCase();
  const fStart = document.getElementById('f-date-start').value;
  const fEnd = document.getElementById('f-date-end').value;
  const fMin = parseInt(document.getElementById('f-score-min').value) || 0;
  const fMax = parseInt(document.getElementById('f-score-max').value) || 100;

  filteredData = masterReportData.filter(d => {
    const dName = (d.examineeName || '').toLowerCase();
    const dScore = d.scorePercentage || 0;
    const dDate = new Date(d.examDate).toISOString().split('T')[0];

    let match = true;
    if (fName && !dName.includes(fName)) match = false;
    if (fStart && dDate < fStart) match = false;
    if (fEnd && dDate > fEnd) match = false;
    if (dScore < fMin || dScore > fMax) match = false;
    return match;
  });
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  if (filteredData.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No records match your filters.</td></tr>';
    return;
  }
  filteredData.forEach(data => {
    const dateStr = new Date(data.examDate).toLocaleString();
    const statusColor = data.passed ? "#2D7D46" : "#C0392B";
    const timeStr = `${Math.floor(data.timeTakenSeconds / 60)}m ${data.timeTakenSeconds % 60}s`;
    tbody.innerHTML += `
      <tr>
        <td>${dateStr}</td><td style="font-weight:bold;">${data.examineeName}</td>
        <td>${data.scorePercentage}% (${data.questionsAnsweredCorrectly}/${data.totalQuestions})</td>
        <td style="color:${statusColor}; font-weight:bold;">${data.passed ? 'PASSED' : 'FAILED'}</td>
        <td>${timeStr}</td><td style="font-size:12px;">${data.weakestDomain}</td>
      </tr>`;
  });
}

document.getElementById('btn-export').addEventListener('click', () => {
  if (filteredData.length === 0) return alert("No data to export.");
  let csv = "Date,Name,Score (%),Correct,Total,Status,Time Taken (s),Strongest Domain,Weakest Domain\n";
  filteredData.forEach(r => {
    const date = new Date(r.examDate).toLocaleString().replace(/,/g, '');
    csv += `${date},"${r.examineeName}",${r.scorePercentage},${r.questionsAnsweredCorrectly},${r.totalQuestions},${r.passed?"PASSED":"FAILED"},${r.timeTakenSeconds},"${r.strongestDomain}","${r.weakestDomain}"\n`;
  });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  link.download = "Filtered_Exam_Results.csv";
  link.click();
});

// ── TAB 2: PRESET BUILDER ──
let allQuestions = [];
let selectedQIds = new Set();
let currentPresetTarget = 25;

const POOL_FILES = ['windchill_mock_test_1.json', 'windchill_mock_test_2.json', 'windchill_mock_test_3.json', 'windchill_mock_test_4.json', 'windchill_mock_test_5.json'];

async function loadQuestionsForPreset() {
  const tbody = document.getElementById('questions-body');
  try {
    const reqs = POOL_FILES.map(f => fetch(f).then(r => r.ok ? r.json() : []).catch(()=>[]));
    const res = await Promise.all(reqs);
    allQuestions = res.flat();
    
    if(allQuestions.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:red;">Failed to load JSON files. Check directory.</td></tr>';
      return;
    }
    loadPresetContext(); // Loads current selection from DB
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="5">Error: ${e.message}</td></tr>`;
  }
}

async function loadPresetContext() {
  const slot = document.getElementById('preset-slot-selector').value;
  if(slot === 'preset_1') currentPresetTarget = 25;
  if(slot === 'preset_2') currentPresetTarget = 50;
  if(slot === 'preset_3') currentPresetTarget = 75;
  
  selectedQIds.clear();
  document.getElementById('btn-delete-preset').style.display = 'none';

  // Try to load existing preset from DB
  try {
    const doc = await db.collection("exam_presets").doc(slot).get();
    if(doc.exists && doc.data().questions) {
      doc.data().questions.forEach(id => selectedQIds.add(id));
      document.getElementById('btn-delete-preset').style.display = 'inline-block';
    }
  } catch(e) { console.error("Error fetching preset", e); }
  
  updateSelectionCounter();
  renderQuestionsTable();
}

function renderQuestionsTable() {
  const tbody = document.getElementById('questions-body');
  tbody.innerHTML = '';
  allQuestions.forEach(q => {
    const isChecked = selectedQIds.has(q.id) ? 'checked' : '';
    const dColor = q.difficulty === 'easy' ? 'green' : q.difficulty === 'medium' ? 'orange' : 'red';
    tbody.innerHTML += `
      <tr>
        <td style="text-align:center;"><input type="checkbox" class="q-checkbox" value="${q.id}" onchange="toggleQ(${q.id}, this.checked)" ${isChecked}></td>
        <td style="font-weight:bold;">${q.id}</td>
        <td style="color:${dColor}; font-weight:bold; text-transform:capitalize;">${q.difficulty}</td>
        <td style="font-size:11px; font-weight:bold;">${q.topic}</td>
        <td>${q.question}</td>
      </tr>`;
  });
}

function toggleQ(id, isChecked) {
  if(isChecked) selectedQIds.add(id); else selectedQIds.delete(id);
  updateSelectionCounter();
}

function updateSelectionCounter() {
  const counter = document.getElementById('selection-counter');
  counter.textContent = `Selected: ${selectedQIds.size} / ${currentPresetTarget}`;
  counter.style.color = selectedQIds.size === currentPresetTarget ? '#2D7D46' : '#C0392B';
}

document.getElementById('btn-save-preset').addEventListener('click', async () => {
  if(selectedQIds.size !== currentPresetTarget) {
    return alert(`❌ You must select exactly ${currentPresetTarget} questions for this preset. You have currently selected ${selectedQIds.size}.`);
  }
  
  const slot = document.getElementById('preset-slot-selector').value;
  const nameText = document.getElementById('preset-slot-selector').options[document.getElementById('preset-slot-selector').selectedIndex].text;
  
  const payload = {
    id: slot,
    name: nameText,
    targetCount: currentPresetTarget,
    questions: Array.from(selectedQIds),
    updatedAt: new Date().toISOString()
  };

  const btn = document.getElementById('btn-save-preset');
  btn.textContent = "Saving...";
  try {
    await db.collection("exam_presets").doc(slot).set(payload);
    alert("✅ Preset successfully saved and is now live for students!");
    document.getElementById('btn-delete-preset').style.display = 'inline-block';
  } catch(e) { alert("Error saving: " + e.message); }
  btn.textContent = "💾 Save Preset to Database";
});

document.getElementById('btn-delete-preset').addEventListener('click', async () => {
  if(!confirm("Are you sure you want to delete this preset? It will no longer be available to students.")) return;
  const slot = document.getElementById('preset-slot-selector').value;
  try {
    await db.collection("exam_presets").doc(slot).delete();
    alert("Preset deleted.");
    loadPresetContext();
  } catch(e) { alert("Error deleting: " + e.message); }
});
</script>
</body>
</html>
